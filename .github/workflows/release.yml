name: Release (Windows)

# 트리거:
#   1) git tag v*.*.* push → 자동 빌드 + GitHub Releases 배포
#   2) Actions 탭 → "Run workflow" 버튼 → 수동 실행
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-win:
    runs-on: windows-latest

    permissions:
      contents: write        # GitHub Releases 생성·업로드 권한

    steps:
      # ── 소스 체크아웃 ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js 설정 (npm 캐시 활성화) ──────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 의존성 설치 (package-lock.json 기준 정확 재현) ──────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 테스트 (실패 시 빌드 중단) ──────────────────────────────────────────
      - name: Run tests
        run: npm test

      # ── Windows NSIS 설치 파일 빌드 + GitHub Releases 업로드 ────────────────
      #   --publish always: latest.yml + .exe + .blockmap 을 Release 에 자동 등록
      #   GH_TOKEN: 저장소 Settings → Secrets → Actions 에 등록된 PAT(repo 쓰기 권한)
      - name: Build & Publish (Windows)
        run: npm run build && npx electron-builder --win --x64 --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
